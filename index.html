<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Deneyimi</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background-color: #f5f5f5; }
        model-viewer { width: 100vw; height: 100vh; display: block; }
        #ar-button {
            background-color: white; border-radius: 30px; border: 1px solid #dadce0;
            padding: 12px 24px; position: absolute; bottom: 40px; left: 50%;
            transform: translateX(-50%); cursor: pointer;
        }
    </style>
</head>
<body>

    <model-viewer 
        src="elf1.glb" 
        ios-src="elf1.usdz"
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        shadow-intensity="1" 
        
        /* ÖNEMLİ: Bilgisayar ekranında ve mobilde modeli küçültüp dikleştiren ayarlar */
        scale="0.01 0.01 0.01" 
        orientation="0deg 90deg 0deg"
        
        exposure="1"
        autoplay>
        
        <button slot="ar-button" id="ar-button">
            👋 AR İle Dünyaya Yerleştir
        </button>

    </model-viewer>

</body>
</html>
