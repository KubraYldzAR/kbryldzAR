<!doctype html>
<html lang="tr">
  <head>
    <title>Kübra Yıldız - AR Experience</title>
    <meta charset="utf-8">
    <meta name="description" content="<model-viewer> AR Display">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link type="text/css" href="./styles.css" rel="stylesheet"/>
    
    <style>
      /* FOTOĞRAF ÇEKME BUTONU TASARIMI */
      #screenshot-btn {
        position: absolute;
        bottom: 20px;
        right: 20px;
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background-color: white;
        border: 4px solid #ffcc00; /* Slayttaki sarı tonu */
        cursor: pointer;
        z-index: 100;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      }
      #screenshot-btn:active {
        transform: scale(0.9);
      }
    </style>
  </head>
  <body>
    <model-viewer 
      src="elf1.glb" 
      ios-src="elfa.usdz"
      scale="0.1 0.1 0.1" 
      orientation="0deg 90deg 0deg" 
      ar 
      ar-modes="webxr scene-viewer quick-look" 
      camera-controls 
      tone-mapping="neutral" 
      poster="poster.webp" 
      shadow-intensity="1" 
      autoplay 
      animation-name="Animation" 
      loop
      animation-crossfade-duration="0" 
      ar-placement="floor">

      <div class="progress-bar hide" slot="progress-bar">
          <div class="update-bar"></div>
      </div>

      <button slot="ar-button" id="ar-button">
          AR Denemek İçin Tıkla
      </button>

      <button type="button" id="screenshot-btn">📸</button>

      <div id="ar-prompt">
          <img src="ar_hand_prompt.png">
      </div>
    </model-viewer>  

    <script src="script.js"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    
    <script>
      const modelViewer = document.querySelector("model-viewer");

      // FOTOĞRAF ÇEKME MANTIĞI
      const screenshotBtn = document.querySelector('#screenshot-btn');
      screenshotBtn.addEventListener('click', async () => {
        // Modelin o anki görüntüsünü yüksek kalitede yakalar
        const blob = await modelViewer.toBlob({ idealAspect: true });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `Sanat_Hatirasi_${new Date().getTime()}.png`;
        a.click();
        URL.revokeObjectURL(url);
      });

      const startAnim = () => {
        modelViewer.animationName = "Animation";
        modelViewer.play();
        
        setTimeout(() => {
          if (modelViewer.paused) {
            modelViewer.animationName = "Scene";
            modelViewer.play();
          }
        }, 50);
      };

      modelViewer.addEventListener("ar-status", (event) => {
        if (event.detail.status === "object-placed") {
          startAnim();
        }
      });

      modelViewer.addEventListener("load", startAnim);
    </script>
  </body>
</html>
