<!doctype html>
<html lang="tr">
  <head>
    <title>Kübra Yıldız - AR Experience</title>
    <meta charset="utf-8">
    <meta name="description" content="<model-viewer> AR Display">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link type="text/css" href="./styles.css" rel="stylesheet"/>
    <style>
      /* FOTOĞRAF BUTONU STİLİ (BAŞLANGIÇTA GİZLİ) */
      #screenshot-btn {
        display: none; /* Sadece AR modunda görünecek */
        position: absolute;
        bottom: 30px;
        right: 30px;
        width: 70px;
        height: 70px;
        border-radius: 50%;
        background-color: white;
        border: 5px solid #ffcc00;
        cursor: pointer;
        z-index: 999;
        font-size: 30px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        align-items: center;
        justify-content: center;
      }
      #screenshot-btn:active { transform: scale(0.9); }
    </style>
  </head>
  <body>
    <model-viewer 
      src="elf1.glb" 
      ios-src="elfa.usdz"
      scale="0.1 0.1 0.1" 
      orientation="0deg 90deg 0deg" 
      ar 
      ar-modes="webxr scene-viewer quick-look" 
      camera-controls 
      tone-mapping="neutral" 
      poster="poster.webp" 
      shadow-intensity="1" 
      autoplay 
      animation-name="Animation" 
      loop
      animation-crossfade-duration="0" 
      ar-placement="floor">

      <div class="progress-bar hide" slot="progress-bar">
          <div class="update-bar"></div>
      </div>

      <button slot="ar-button" id="ar-button">
          AR Denemek İçin Tıkla
      </button>

      <button type="button" id="screenshot-btn">📸</button>

      <div id="ar-prompt">
          <img src="ar_hand_prompt.png">
      </div>
    </model-viewer>  

    <script src="script.js"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    
    <script>
      const modelViewer = document.querySelector("model-viewer");
      const screenshotBtn = document.querySelector("#screenshot-btn");

      // 1. FOTOĞRAF ÇEKME FONKSİYONU
      screenshotBtn.addEventListener('click', async () => {
        const blob = await modelViewer.toBlob({ idealAspect: true });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `AR_Sanat_Hatirasi_${new Date().getTime()}.png`;
        a.click();
        URL.revokeObjectURL(url);
      });

      // 2. AR DURUMUNA GÖRE BUTONU GÖSTER/GİZLE
      modelViewer.addEventListener("ar-status", (event) => {
        if (event.detail.status === "session-started") {
          // AR Kamerası açıldı, butonu göster
          screenshotBtn.style.display = "flex";
        } else if (event.detail.status === "not-presenting") {
          // AR'dan çıkıldı, butonu gizle
          screenshotBtn.style.display = "none";
        }

        // Senin mevcut animasyon mantığın:
        if (event.detail.status === "object-placed") {
          startAnim();
        }
      });

      const startAnim = () => {
        modelViewer.animationName = "Animation";
        modelViewer.play();
        
        setTimeout(() => {
          if (modelViewer.paused) {
            modelViewer.animationName = "Scene";
            modelViewer.play();
          }
        }, 50);
      };

      modelViewer.addEventListener("load", startAnim);
    </script>
  </body>
</html>
